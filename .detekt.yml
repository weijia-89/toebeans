# detekt configuration — minimal v0.1 overlay on top of detekt's default config.
# Rationale: keep static analysis useful, not noisy. Bump severity later if needed.

build:
  maxIssues: 0
  weights:
    complexity: 2
    LongParameterList: 1
    style: 1

style:
  active: true
  MagicNumber:
    active: false
  MaxLineLength:
    active: true
    maxLineLength: 120
  ReturnCount:
    active: true
    # Bumped from 4 to 6 because two legitimate guard-clause functions hit
    # exactly 6 returns: validatePhase (input validation across 5 fields
    # plus the success case) and formatTimeAgo (tiered time-ago buckets:
    # just-now / Nm / Nh / yesterday / Nd / fallback date). Both read worse
    # as single-return.
    max: 6
  WildcardImport:
    active: true
  UnusedPrivateMember:
    active: true
    # @Preview composables are invoked by Android Studio's preview pane,
    # not by ordinary call graph. Don't flag them.
    ignoreAnnotated: ['Preview']
  ForbiddenComment:
    # v0.1 is an explicit scaffold. The two TODOs in AndroidNotificationActuator
    # docstrings point at slice-1 work (UI banner hook for missing permission;
    # SQLDelight sequence for stable PendingIntent codes) — intentional
    # placeholders documenting known-future work, not stale work markers.
    # Disabled outright rather than partial-allowlisted because the
    # deprecated-property syntax differs across detekt 1.23.x point releases.
    # Re-enable when the scaffold ships and TODOs become a smell again.
    active: false

complexity:
  TooManyFunctions:
    active: false
  LongMethod:
    active: true
    threshold: 60
    # Compose screens compose many sub-composables inline; the top-level
    # @Composable screen function naturally grows past 60 lines without
    # being meaningfully "long." Detekt's standard exception list.
    ignoreAnnotated: ['Composable']
  LongParameterList:
    active: true
    # @Composable accepts state, callbacks, modifier, contentPadding,
    # viewModel — five-plus is the norm. Don't flag.
    ignoreAnnotated: ['Composable']

naming:
  PackageNaming:
    # YAML single-quoted strings preserve backslashes literally, so the
    # double-backslash form '\\.' becomes a regex meaning
    # "literal backslash + any-char" — which never matches a real package
    # like app.toebeans.android.ui.settings. Use a single backslash here.
    packagePattern: '^[a-z]+(\.[a-z][a-z0-9]*)*$'
  FunctionNaming:
    # Compose convention is PascalCase @Composable functions
    # (Button(), Text(), HomeScreen()). Don't flag.
    ignoreAnnotated: ['Composable']

empty-blocks:
  EmptyFunctionBlock:
    active: false  # Stubs in the v0.1 scaffold intentionally have empty bodies.

