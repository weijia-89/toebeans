name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  fitness-functions:
    name: Fitness functions (lint-class CI gates)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: No-network gate
        run: bash scripts/test_no_network.sh .
      - name: No-analytics gate
        run: bash scripts/test_no_analytics.sh .
      - name: Scheduler-purity gate
        run: bash scripts/test_scheduler_purity.sh .
      - name: Permission-allowlist gate
        run: bash scripts/test_permission_allowlist.sh .
      - name: No-PII-in-crash-log gate (ADR-0009)
        run: bash scripts/test_no_pii_in_crash_log.sh .
      - name: No-PBKDF2-in-backup-after-TBN2 gate (ADR-0018)
        # The script is gated on TBN2 presence in the source tree. Pre-D1 the
        # script no-ops with an info message; post-D1 (TBN2 envelope live in
        # BackupCipherV2) the script enforces that PBKDF2 references in the
        # backup module are limited to the explicitly allow-listed TBN1 legacy
        # decrypt path. See scripts/test_no_pbkdf2_in_backup_after_tbn2.sh
        # header for allow-marker syntax.
        run: bash scripts/test_no_pbkdf2_in_backup_after_tbn2.sh .
      - name: No-em-dash-in-docs fitness function (Wei voice MEMORY[39c0f94f])
        # Enforces the em-dash iron rule: U+2014 is banned from *.md / *.txt
        # documentation. Allow-list opt-out via EMDASH-ALLOWED token in the
        # first 5 lines of a file (use sparingly; name in calibration). The
        # paired pre-commit hook at scripts/git-hooks/pre-commit runs the
        # same logic against staged files only for fast local feedback.
        run: bash scripts/test_no_em_dash_in_docs.sh .
      - name: No-duplicate-private-test-class-names gate (ADR-0017 Lesson 2)
        run: bash scripts/test_no_duplicate_private_test_class_names.sh .
      - name: AGENTS / CLAUDE parity
        run: bash scripts/agents_claude_parity.sh .
      - name: Pre-commit hook self-test (secrets regex + vibe-dangerous pattern sync)
        run: bash scripts/test_pre_commit_hook.sh .
      - name: Duplicate-private fitness-function self-test
        run: bash scripts/test_test_no_duplicate_private_test_class_names.sh .
      - name: No-PBKDF2-after-TBN2 fitness-function self-test
        run: bash scripts/test_test_no_pbkdf2_in_backup_after_tbn2.sh .
      - name: No-em-dash-in-docs fitness-function self-test
        run: bash scripts/test_test_no_em_dash_in_docs.sh .
      - name: Trainer PR review gate self-test
        run: bash scripts/test_ci_trainer_pr_review_gate.sh .
      - name: Trainer gate rerun self-test
        run: bash scripts/test_trainer_pr_review_gate_rerun.sh .

  trainer-pr-review-gate:
    # PR-only. Fails until a canonical trainer/sdk codereview comment exists on the
    # PR with head= matching HEAD and ### Trainer notes (forbids ### Pedagogy).
    name: Trainer PR review comment gate
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - name: Require trainer code-review comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/ci-trainer-pr-review-gate.sh \
            "${{ github.event.pull_request.number }}" \
            "${{ github.event.pull_request.head.sha }}" \
            "${{ github.event.pull_request.head.ref }}" \
            "${{ github.repository }}"

  vibe-dangerous-gate:
    # Survives `git commit --no-verify`. Enforces the same rule as
    # scripts/git-hooks/pre-commit: any vibe-dangerous path change must be paired
    # with a new calibration entry. The local hook is the fast path; this is the
    # belt-and-suspenders gate.
    name: Vibe-dangerous review gate (--no-verify defense)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to diff base..head
      - name: Determine SHA range
        id: range
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Run vibe-dangerous CI check
        run: |
          bash scripts/ci-vibe-dangerous-check.sh \
            "${{ steps.range.outputs.base }}" \
            "${{ steps.range.outputs.head }}"

  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

  dependency-review:
    # PR-only. Blocks dependency additions that introduce high-severity CVEs or
    # are missing licenses. Slopsquatting defense aligns with AGENTS.md §
    # Hallucination vigilance.
    name: Dependency review
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - name: Run dependency-review-action
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  build-and-test:
    # Runs in parallel with trainer-pr-review-gate (buds pattern). Gate still
    # fails the workflow until the canonical PR comment exists; it must not
    # block Gradle signal on first push or while the agent posts/PATCHes review.
    name: Gradle build + shared tests
    runs-on: ubuntu-24.04
    needs: [fitness-functions]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Validate wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Lint (ktlint + detekt)
        run: ./gradlew ktlintCheck detekt --stacktrace
      - name: Shared JVM tests (scheduler, backup, model)
        run: ./gradlew :shared:jvmTest :shared:testDebugUnitTest --stacktrace
      - name: Coverage verification (Kover, line coverage ≥ 85% per ADR-0006)
        run: ./gradlew :shared:koverVerify --stacktrace
      - name: Android app assembleDebug
        run: ./gradlew :androidApp:assembleDebug --stacktrace
